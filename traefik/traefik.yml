# Traefik v3 static configuration for KBM.
# Loaded by the `traefik` service in compose.yaml (only when the `traefik`
# Compose profile is active). Per-route rules + TLS hints live as labels on
# the python-app service in compose.yaml.

# Disable the dashboard by default — re-enable behind auth if you want it.
api:
  dashboard: false
  insecure: false

log:
  level: INFO

accessLog: {}

# ---- Entrypoints ------------------------------------------------------------
# :80 redirects everything to :443. :443 terminates TLS.
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

# ---- Providers --------------------------------------------------------------
# Docker socket → Traefik watches container labels and builds routes
# automatically. exposedByDefault=false means only containers that opt in
# (via traefik.enable=true) get routes — protects against accidental exposure.
providers:
  docker:
    exposedByDefault: false
    network: appnet
    watch: true

# ---- Certificate resolver(s) ------------------------------------------------
# DNS-01 challenge with a WILDCARD cert covering *.${BASE_DOMAIN}.
#
# Why DNS-01 (and not HTTP-01)?
#   This is a multi-tenant app: tenants live on arbitrary, dynamically created
#   subdomains (<tenant>.${BASE_DOMAIN}), matched by a HostRegexp router in
#   compose.yaml. Traefik — unlike Caddy — has no on-demand TLS: it must know
#   the cert domains up front and cannot derive a concrete hostname from a
#   regex. The tenant router therefore requests a WILDCARD (*.${BASE_DOMAIN}),
#   and Let's Encrypt only issues wildcards over DNS-01. (HTTP-01 cannot issue
#   wildcards — that mismatch was the bug: tenant subdomains got Traefik's
#   self-signed default cert and showed "Not secure".)
#
# One wildcard cert covers all current and future tenants — no per-subdomain
# issuance, no Let's Encrypt rate-limit risk.
#
# REQUIRED: DNS provider API credentials in .env. Configured here for Cloudflare
# (lego provider `cloudflare`), which needs just ONE scoped API token:
#     CF_DNS_API_TOKEN   — a Cloudflare API token (see prerequisites below)
# The traefik service in compose.traefik.yaml loads .env, so lego picks this up
# automatically. For a different provider change `provider:` below and set that
# provider's vars — see https://doc.traefik.io/traefik/https/acme/#providers
#
# WHY CLOUDFLARE (and not Namecheap): Cloudflare DNS is free, propagates in
# seconds (no slow-propagation timeout hacks), and — unlike Namecheap — needs
# NO source-IP whitelisting, so cert renewals keep working even if the VPS IP
# changes. Setup is one-time and then completely hands-off.
#
# CLOUDFLARE PREREQUISITES (one-time):
#   1. Add the ${BASE_DOMAIN} zone to a (free) Cloudflare account and switch the
#      domain's nameservers to the two Cloudflare gives you. This is a UI change
#      in the Namecheap dashboard (Domain List → Manage → Nameservers → Custom
#      DNS) — NOT the Namecheap API.
#   2. Create a scoped API token: Cloudflare dashboard → My Profile → API Tokens
#      → Create Token → "Edit zone DNS" template. Scope it to the ${BASE_DOMAIN}
#      zone. The token must have Zone:DNS:Edit + Zone:Zone:Read so lego can
#      write the _acme-challenge TXT record.
#   3. Put that token in .env as CF_DNS_API_TOKEN (see compose.traefik.yaml).
certificatesResolvers:
  letsencrypt:
    acme:
      email: "{{ env \"ACME_EMAIL\" }}"
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        # Public resolvers used to verify the _acme-challenge TXT record has
        # propagated before telling Let's Encrypt to check it. Cloudflare
        # propagates in seconds, so lego's default propagation timeout is fine
        # — no override needed.
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
      # Uncomment for staging while you're testing — much higher rate limits,
      # but the certs aren't trusted by browsers.
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory
