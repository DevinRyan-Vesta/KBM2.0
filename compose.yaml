services:
  python-app:
    build:
      context: .
    container_name: python-app
    restart: unless-stopped
    init: true
    env_file:
      - .env
    expose:
      - "8000"
    # Add the host's docker group so the appuser inside the container can use
    # the mounted docker socket. The install script writes DOCKER_GID into .env
    # by reading `getent group docker` on the host (typically 999 on Ubuntu).
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - ./.git:/app/.git
      - ./compose.yaml:/app/compose.yaml:ro
      - ./.env:/app/.env:ro
      - ./master_db:/app/master_db
      - ./tenant_dbs:/app/tenant_dbs
      - ./backups:/app/backups
      - /var/run/docker.sock:/var/run/docker.sock
      # Source mounts so the in-app system update can pull code without a rebuild
      - ./templates:/app/templates
      - ./static:/app/static
      - ./audits:/app/audits
      - ./auth:/app/auth
      - ./inventory:/app/inventory
      - ./checkout:/app/checkout
      - ./contacts:/app/contacts
      - ./properties:/app/properties
      - ./smartlocks:/app/smartlocks
      - ./accounts:/app/accounts
      - ./app_admin:/app/app_admin
      - ./main:/app/main
      - ./exports:/app/exports
      - ./utilities:/app/utilities
      - ./middleware:/app/middleware
    networks:
      - appnet

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - python-app
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
